<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Pong Game</title>\n    <style>\n        body { background: black; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }\n        canvas { border: 1px solid white; }\n    </style>\n</head>\n<body>\n    <canvas id="gameCanvas" width="800" height="400"></canvas>\n    <script>\n        const canvas = document.getElementById('gameCanvas');\n        const ctx = canvas.getContext('2d');\n        let leftPaddleY = (canvas.height - 100) / 2;\n        let rightPaddleY = (canvas.height - 100) / 2;\n        const paddleHeight = 100;\n        const paddleWidth = 10;\n        const ballSize = 10;\n        const ball = { x: canvas.width / 2, y: canvas.height / 2, dx: 5, dy: 2 };\n        let leftScore = 0;\n        let rightScore = 0;\n\n        function drawPaddle(x, y) {\n            ctx.fillStyle = 'white';\n            ctx.fillRect(x, y, paddleWidth, paddleHeight);\n        }\n\n        function drawBall() {\n            ctx.fillStyle = 'white';\n            ctx.beginPath();\n            ctx.arc(ball.x, ball.y, ballSize, 0, Math.PI * 2);\n            ctx.fill();\n        }\n\n        function drawScore() {\n            ctx.font = '30px Arial';\n            ctx.fillText(leftScore, canvas.width / 4, 30);\n            ctx.fillText(rightScore, 3 * canvas.width / 4, 30);\n        }\n\n        function update() {\n            // Move AI paddle\n            if (rightPaddleY + paddleHeight / 2 < ball.y) rightPaddleY += 4;\n            else if (rightPaddleY + paddleHeight / 2 > ball.y) rightPaddleY -= 4;\n            // Ball movement\n            ball.x += ball.dx;\n            ball.y += ball.dy;\n            // Ball collision detection\n            if (ball.y + ballSize > canvas.height || ball.y - ballSize < 0) ball.dy *= -1;\n            if (ball.x < paddleWidth && ball.y > leftPaddleY && ball.y < leftPaddleY + paddleHeight) {\n                ball.dx *= -1;\n            } else if (ball.x > canvas.width - paddleWidth && ball.y > rightPaddleY && ball.y < rightPaddleY + paddleHeight) {\n                ball.dx *= -1;\n            } else if (ball.x < 0) {\n                rightScore++;\n                resetBall();\n            } else if (ball.x > canvas.width) {\n                leftScore++;\n                resetBall();\n            }\n        }\n\n        function resetBall() {\n            ball.x = canvas.width / 2;\n            ball.y = canvas.height / 2;\n            ball.dx *= -1;\n        }\n\n        function keyDownHandler(e) {\n            switch (e.key) {\n                case "ArrowUp":\n                    if (leftPaddleY > 0) leftPaddleY -= 20;\n                    break;\n                case "ArrowDown":\n                    if (leftPaddleY < canvas.height - paddleHeight) leftPaddleY += 20;\n                    break;\n            }\n        }\n\n        document.addEventListener('keydown', keyDownHandler);\n\n        function render() {\n            ctx.clearRect(0, 0, canvas.width, canvas.height);\n            drawPaddle(0, leftPaddleY);\n            drawPaddle(canvas.width - paddleWidth, rightPaddleY);\n            drawBall();\n            drawScore();\n        }\n\n        function gameLoop() {\n            update();\n            render();\n            requestAnimationFrame(gameLoop);\n        }\n\n        gameLoop();\n    </script>\n</body>\n</html>
